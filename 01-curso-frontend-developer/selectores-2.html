<head>

        div p {

        }
        div > div {

        .es{

        div + section {

        }

        <div>

            <p>Platzi</p>
            <div class="es">Es</div>

    </div>

        Barato!
    </section>
    <div>
        E increible!
    </div>

</body>
</html>
